name: Prod-Pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      commit_id:
        required: true
        type: string
      environment:
        required: true
        type: string
      source_repo:
        required: true
        type: string

permissions:
  contents: read
  statuses: write

env:
  ACCOUNT_ID: 522534289017

jobs:
  prod-pipeline:
    runs-on: self-hosted

    steps:
    # ---------------------------------------------------
    # Safety guard
    # ---------------------------------------------------
    - name: Ensure PROD environment
      run: |
        if [ "${{ inputs.environment }}" != "dev" ]; then
          echo "This workflow is only for PROD deployments"
          exit 1
        fi
        echo "PROD deployment confirmed"

    # ---------------------------------------------------
    # Validate promotion chain (REAL approval gate)
    # ---------------------------------------------------
    - name: Validate Promotion Chain
      run: |
        COMMIT=${{ inputs.commit_id }}
        REPO=${{ inputs.source_repo }}
        TOKEN=${{ secrets.GITHUB_TOKEN }}

        echo "Fetching check runs..."

        curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/commits/$COMMIT/check-runs \
            > checks.json

        echo "Available checks:"
        jq -r '.check_runs[].name' checks.json

        REQUIRED=(
          # "UNIT_TEST"
          # "NPM_AUDIT"
          # "DOCKER_BUILD"
          "DEV_DEPLOY"
          "UAT_DEPLOY"
        )

        for KEYWORD in "${REQUIRED[@]}"; do
          STATE=$(jq -r \
            ".check_runs[] 
            | select(.name | contains(\"$KEYWORD\")) 
            | .conclusion" checks.json | head -n 1)

          echo "$KEYWORD -> $STATE"

          if [ "$STATE" != "success" ]; then
            echo "❌ $KEYWORD failed or missing. Cannot deploy to PROD."
            exit 1
          fi
        done

        echo "✅ All promotion checks passed. PROD deployment allowed."

    # ---------------------------------------------------
    # AWS credentials (PROD)
    # ---------------------------------------------------
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-region: ${{ secrets.PROD_AWS_REGION }}
        aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}

    # ---------------------------------------------------
    # Login to EKS PROD
    # ---------------------------------------------------
    - name: Authenticate to EKS PROD
      run: |
        aws eks update-kubeconfig --region us-east-1 --name robomart-dev
        kubectl get nodes

    # ---------------------------------------------------
    # Checkout deploy repo
    # ---------------------------------------------------
    - name: Checkout Deploy Repo
      uses: actions/checkout@v4
      with:
        repository: azharmd-dev/catalogue-deploy

    # ---------------------------------------------------
    # Deploy to PROD
    # ---------------------------------------------------
    - name: Deploy to PROD
      id: deploy_check
      run: |
        helm upgrade --install ${{ inputs.component }} \
          -f values-dev.yaml \
          --set deployment.imageVersion=${{ inputs.commit_id }} \
          -n ${{ inputs.project }} \
          --atomic --wait --timeout=10m .

    # ---------------------------------------------------
    # Convert outcome → valid GitHub state
    # ---------------------------------------------------
    - name: Convert outcome to GitHub status
      id: status_map
      if: always()
      run: |
        if [ "${{ steps.deploy_check.outcome }}" == "success" ]; then
          echo "state=success" >> $GITHUB_OUTPUT
        else
          echo "state=failure" >> $GITHUB_OUTPUT
        fi

    # ---------------------------------------------------
    # Set commit status → PROD_DEPLOY
    # ---------------------------------------------------
    - name: Set PROD commit status
      if: always()
      uses: azhardevmd/workflows/.github/actions/set-commit-status@main
      with:
        state: ${{ steps.status_map.outputs.state }}
        context: "PROD_DEPLOY"
        status_description: "Production ${{ steps.deploy_check.outcome }}"
        target_url: ${{ github.server_url }}/${{ inputs.source_repo }}/actions/runs/${{ github.run_id }}